description: Alert Production pipeline specialized for LATISS

# This file should strive to contain just an import from ap_pipe.
# Exceptions are allowed temporarily when urgent bug fixes and
# prompt_processing build can't wait for the lsst_distrib
# release schedule.
imports:
  - location: $AP_PIPE_DIR/pipelines/LATISS/ApPipe.yaml
    include:
      - prompt
tasks:
  isr:
    class: lsst.ip.isr.IsrTaskLSST
    config:
      # These are copied from obs_lsst ticket branch DM-46356
      overscanCamera.defaultDetectorConfig.defaultAmpConfig.saturation: 120000
      crosstalk.doQuadraticCrosstalkCorrection: False
      doDeferredCharge: False
      doBrighterFatter: False
      cameraKeywordsToCompare: ["SEQNAME", "SEQFILE", "SEQCKSUM", "ODP", "AP0_RC", "TEMP_SET"]
  diaPipe:
    class: lsst.ap.association.DiaPipelineTask
    config:
      doPackageAlerts: True
      alertPackager.doProduceAlerts: True